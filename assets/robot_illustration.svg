<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="かわいいロボットのイラスト">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#2563eb" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- 影 -->
  <ellipse cx="100" cy="178" rx="42" ry="7" fill="#2563eb" opacity="0.12"/>

  <!-- アンテナ -->
  <line x1="100" y1="34" x2="100" y2="18" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="14" r="7" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>

  <!-- 頭 -->
  <g filter="url(#softShadow)">
    <rect x="52" y="34" width="96" height="78" rx="28" fill="url(#bodyGrad)"/>
    <rect x="60" y="46" width="80" height="56" rx="22" fill="url(#faceGrad)"/>
  </g>

  <!-- 目（きらきら） -->
  <ellipse cx="82" cy="72" rx="11" ry="13" fill="#1e3a8a"/>
  <ellipse cx="118" cy="72" rx="11" ry="13" fill="#1e3a8a"/>
  <circle cx="86" cy="68" r="4" fill="#ffffff"/>
  <circle cx="122" cy="68" r="4" fill="#ffffff"/>
  <circle cx="79" cy="76" r="2" fill="#93c5fd" opacity="0.9"/>

  <!-- ほっぺ -->
  <ellipse cx="68" cy="86" rx="7" ry="4.5" fill="#fda4af" opacity="0.55"/>
  <ellipse cx="132" cy="86" rx="7" ry="4.5" fill="#fda4af" opacity="0.55"/>

  <!-- 口（にっこり） -->
  <path d="M 86 90 Q 100 102 114 90" fill="none" stroke="#1d4ed8" stroke-width="3.5" stroke-linecap="round"/>

  <!-- 体 -->
  <rect x="62" y="118" width="76" height="52" rx="20" fill="url(#bodyGrad)" filter="url(#softShadow)"/>
  <rect x="78" y="132" width="44" height="24" rx="10" fill="#1d4ed8" opacity="0.25"/>
  <circle cx="100" cy="144" r="6" fill="#fbbf24"/>

  <!-- 腕 -->
  <rect x="34" y="124" width="22" height="14" rx="7" fill="#3b82f6"/>
  <rect x="144" y="124" width="22" height="14" rx="7" fill="#3b82f6"/>
  <circle cx="34" cy="131" r="8" fill="#60a5fa"/>
  <circle cx="166" cy="131" r="8" fill="#60a5fa"/>

  <!-- 足 -->
  <rect x="74" y="168" width="20" height="12" rx="6" fill="#1d4ed8"/>
  <rect x="106" y="168" width="20" height="12" rx="6" fill="#1d4ed8"/>
</svg>
